<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BareAesthetic</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<header class="navbar">

<div class="logo">BareAesthetic</div>

<nav class="nav">

<div class="slider"></div>

<button class="nav-btn active" data-tab="home">Главная</button>
<button class="nav-btn" data-tab="visuals">Визуалы</button>
<button class="nav-btn" data-tab="profile">Профиль</button>
<button class="nav-btn" data-tab="shop">Покупки</button>

</nav>

</header>

<main>

<section id="home" class="tab active">

<h1 class="title">
BareAesthetic Visual Mod
</h1>

<p class="subtitle">
Эстетичные визуалы для Minecraft 1.16.5
</p>

<button class="cta">Скоро в продаже</button>

</section>

<section id="visuals" class="tab">

<h2>Визуалы</h2>

<div class="visual-grid">

<div class="visual-card">
<img src="https://i.imgur.com/F3O9F6K.png">
<h3>Glass ESP</h3>
<p>Стеклянный эффект игроков</p>
</div>

<div class="visual-card">
<img src="https://i.imgur.com/FT7s5sL.png">
<h3>Liquid Glow</h3>
<p>Плавное свечение</p>
</div>

<div class="visual-card">
<img src="https://i.imgur.com/kX5v2Ka.png">
<h3>Chrome Armor</h3>
<p>Хромированная броня</p>
</div>

</div>

</section>

<section id="profile" class="tab">

<h2>Профиль</h2>

<div class="profile">

<img id="avatar" src="https://i.imgur.com/2yaf2wb.png">

<input type="file" id="upload">

<p id="username">Вы не вошли</p>

<button onclick="login()">Войти через Gmail</button>

</div>

</section>

<section id="shop" class="tab">

<h2>Покупки</h2>

<p class="soon">Покупки пока что недоступны :(</p>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
