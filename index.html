<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BareAesthetic</title>

<link rel="stylesheet" href="style.css">

<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body>

<div class="cursor"></div>

<header>

<div class="logo">BareAesthetic</div>

<nav>

<a onclick="openPage('home')">Главная</a>
<a onclick="openPage('shop')">Покупки</a>
<a onclick="openPage('profile')">Профиль</a>
<a onclick="openPage('settings')">Настройки</a>

</nav>

</header>


<!-- ГЛАВНАЯ -->

<section id="home" class="page active">

<h1 class="title">

BareAesthetic

<span id="changingText">Красивый HUD</span>

</h1>

<p class="subtitle">

Лучший визуальный мод для Minecraft 1.16.5

</p>

<div class="cards">

<div class="card">

<h3>🎨 Красивый интерфейс</h3>

<p>Стильный HUD и визуалы.</p>

</div>

<div class="card">

<h3>⚡ Оптимизация</h3>

<p>Работает плавно.</p>

</div>

<div class="card">

<h3>🛡 Безопасность</h3>

<p>Клиент безопасен.</p>

</div>

</div>

</section>


<!-- ПОКУПКИ -->

<section id="shop" class="page">

<div class="centerCard">

<h2>Покупки</h2>

<p>Покупки пока что недоступны :(</p>

</div>

</section>


<!-- ПРОФИЛЬ -->

<section id="profile" class="page">

<div class="profile">

<label class="avatarUpload">

<img id="avatar" src="https://i.imgur.com/2DhmtJ4.png">

<input type="file" id="upload">

</label>

<h2 id="username">Гость</h2>

<div id="g_id_onload"
data-client_id="YOUR_GOOGLE_CLIENT_ID"
data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"></div>

</div>

</section>


<!-- НАСТРОЙКИ -->

<section id="settings" class="page">

<div class="settings">

<h2>Настройки</h2>

<label>Цвет сайта</label>

<input type="color" id="colorPicker">

<label>Шрифт</label>

<select id="fontSelect">

<option value="system-ui">iPhone</option>
<option value="Arial">Arial</option>
<option value="monospace">Monospace</option>

</select>

<label>Тема</label>

<button onclick="toggleTheme()">Сменить тему</button>

</div>

</section>


<script src="script.js"></script>

</body>

</html>
